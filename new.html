<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New Entry</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell narrow">

    <a class="back-link" href="index.html">← Back</a>

    <section class="composer">

      <p class="eyebrow">Capture a memory</p>

      <h1>New Entry</h1>

      <form id="entry-form">

        <label>
          Date
          <input id="date" name="date" type="date" required>
        </label>

        <label>
          Title
          <input
            type="text"
            name="title"
            placeholder="Soundscape"
            required>
        </label>

        <label>
          Note
          <textarea
            name="body"
            rows="8"
            placeholder="What do you want to remember?"
            required></textarea>
        </label>

        <label>
          Photo
          <input
            type="file"
            name="photo"
            accept="image/*">
        </label>

        <label>
          Place
          <input
            type="text"
            name="place"
            placeholder="Düzce">
        </label>

        <button type="submit">
          Publish
        </button>

        <p id="status"></p>

      </form>

    </section>

  </main>

  <script src="config.js"></script>
  <script src="new.js"></script>

</body>
</html>
